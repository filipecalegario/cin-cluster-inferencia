# Camada de discussão (IBIS) + argumentação (Dung) — ver protocolo idea-waddle.
# Cada argumento é uma posição pró/contra uma opção; 'attacks' são refutações
# (o motor calcula a extensão grounded — quais argumentos sobrevivem ao debate).
arguments:
  - id: arg.forn.cn_pro
    target: opt.fornecimento.cn
    stance: pro
    claim: "Custo potencialmente menor e diversificação da cadeia (fora dos EUA), relevante diante de restrições de exportação."
    by: "agent:discovery"
    model: "claude-opus-4-8"

  - id: arg.forn.cn_con
    target: opt.fornecimento.cn
    stance: con
    claim: "Suporte/garantia local e maturidade do software (CANN) ainda frágeis no Brasil."
    by: "@comunidade"

  - id: arg.forn.cn_reb
    target: opt.fornecimento.cn
    stance: pro
    claim: "Parcerias acadêmicas e a rápida maturação do ecossistema Ascend tendem a reduzir esse risco no horizonte do projeto."
    by: "agent:revisor-2"
    model: "claude-opus-4-8 (perspectiva diversa simulada)"
    attacks: [arg.forn.cn_con]

  - id: arg.acel.consumo_con
    target: opt.aceleracao.consumo
    stance: con
    claim: "A licença de driver da NVIDIA restringe o uso de GPUs de consumo (GeForce) em data center."
    by: "@comunidade"

  - id: arg.acel.h100_pro
    target: opt.aceleracao.h100
    stance: pro
    claim: "Ecossistema CUDA maduro e melhor suporte do software de serving reduzem o risco operacional."
    by: "agent:discovery"
    model: "claude-opus-4-8"

  - id: arg.prov.apuana_pro
    target: opt.provisao.apuana
    stance: pro
    claim: "Federar com o Apuana reduz capex inicial e acelera o aprendizado operacional sem obrigar o CIn a comprar toda a capacidade de pico no primeiro ciclo."
    by: "agent:codex"
    model: "gpt-5 (Codex)"

  - id: arg.prov.apuana_con
    target: opt.provisao.apuana
    stance: con
    claim: "Apuana é um ambiente batch; usá-lo como overflow de um serviço interativo pode introduzir latência imprevisível e conflito de governança entre pesquisa e atendimento contínuo."
    by: "agent:codex"
    model: "gpt-5 (Codex)"
    attacks: [arg.prov.apuana_pro]

  - id: arg.prov.cloud_burst_pro
    target: opt.provisao.cloud_burst
    stance: pro
    claim: "Burst contratual em nuvem transforma pico de demanda e contingência em opex controlável, permitindo começar com um cluster local menor."
    by: "agent:codex"
    model: "gpt-5 (Codex)"

  - id: arg.prov.cloud_burst_con
    target: opt.provisao.cloud_burst
    stance: con
    claim: "Sem política rígida de cotas e roteamento, burst em nuvem vira custo variável recorrente e incentiva lock-in operacional."
    by: "agent:codex"
    model: "gpt-5 (Codex)"
    attacks: [arg.prov.cloud_burst_pro]

  # Revisão diversa — ciclo 006 (agent:opencode / big-pickle).
  # Re-apontados às opções reais do main: nuvem (nova), local e cloud_burst (Codex).
  - id: arg.provisao.nuvem_pro
    target: opt.provisao.nuvem
    stance: pro
    claim: "Zero capex e tempo de produção imediato (~1 mês) — vantagem crítica para uma universidade com restrição orçamentária."
    by: "agent:opencode"
    model: "big-pickle"

  - id: arg.provisao.nuvem_con
    target: opt.provisao.nuvem
    stance: con
    claim: "Dados de pesquisa trafegam para servidores externos; dependência de fornecedor estrangeiro; custo recorrente elevado a longo prazo."
    by: "agent:opencode"
    model: "big-pickle"

  - id: arg.provisao.local_diverso_pro
    target: opt.provisao.local
    stance: pro
    claim: "Soberania total sobre dados e infraestrutura; investimento único; alinhado à missão de universidade pública de manter capacidade própria."
    by: "agent:opencode"
    model: "big-pickle"

  - id: arg.provisao.local_diverso_con
    target: opt.provisao.local
    stance: con
    claim: "Exige capex elevado, espaço físico, refrigeração e equipa técnica dedicada — recursos escassos no CIn."
    by: "agent:opencode"
    model: "big-pickle"

  - id: arg.operacoes.dedicado_pro
    target: opt.operacoes.dedicado
    stance: pro
    claim: "Sem um responsável dedicado, o cluster corre risco de parar por falta de manutenção — especialmente numa universidade sem cultura de SLA."
    by: "agent:opencode"
    model: "big-pickle"

  - id: arg.operacoes.labs_con
    target: opt.operacoes.labs
    stance: con
    claim: "Autogestão pelos labs sobrecarrega investigadores e cria risco de descontinuidade quando o responsável informal sai."
    by: "agent:opencode"
    model: "big-pickle"

  - id: arg.acel.h100_risco_monocultura
    target: opt.aceleracao.h100
    stance: con
    claim: "Dependência excessiva de um único fornecedor (NVIDIA) fragiliza o CIn diante de restrições de exportação e pricing futuro."
    by: "agent:opencode"
    model: "big-pickle"
