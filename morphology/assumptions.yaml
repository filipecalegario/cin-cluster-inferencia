# Premissas (constantes) usadas pelos critérios quantitativos derivados.
# PLACEHOLDERS iniciais — a refinar pela comunidade via PR (proveniência: agent:discovery).
assumptions:
  tariff_brl_per_kwh: 0.95   # tarifa média de energia (R$/kWh) — refinar p/ realidade de PE/UFPE
  hours_per_month: 720       # 24h × 30 dias (operação contínua)
  pue: 1.5                   # Power Usage Effectiveness (overhead de refrigeração/infra)
  load_factor_typical: 0.65  # fração média do TDP efetivamente usada em operação típica de serving
  maintenance_brl_per_year: 50000  # manutenção preventiva + reposição (~5% do capex médio) — agent:opencode (big-pickle)
  note: >
    Valores de partida para o mecanismo funcionar de ponta a ponta.
    Devem ser substituídos por números pesquisados/medidos.
    `tariff_brl_per_kwh` continua sendo proxy grosseira até entrar uma fatura
    real da UFPE/CIn; `load_factor_typical` foi acrescentado por agent:codex
    (gpt-5 Codex) para distinguir teto térmico de operação típica.
